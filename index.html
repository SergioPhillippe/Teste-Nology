<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Cashback - Nology</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; box-shadow: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; cursor: pointer; font-size: 16px; border: none; }
        button:hover { background-color: #0056b3; }
        .resultado { margin-top: 20px; padding: 10px; background: #e2f0d9; border-left: 5px solid #385723; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Cashback</h2>
    <div class="form-group">
        <label>Valor do Produto (R$):</label>
        <input type="number" id="valor" value="600">
    </div>
    <div class="form-group">
        <label>Desconto (%):</label>
        <input type="number" id="desconto" value="0">
    </div>
    <div class="form-group">
        <label>Tipo de Cliente:</label>
        <select id="vip">
            <option value="false">Normal</option>
            <option value="true">VIP</option>
        </select>
    </div>
    <button onclick="calcular()">Calcular Cashback</button>

    <div id="resultado" class="resultado" style="display:none;"></div>

    <h3>Seu Histórico (Deste IP)</h3>
    <table id="tabela-historico">
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Valor Pago</th>
                <th>Cashback</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000"; // Mude para a URL de hospedagem depois

    async function calcular() {
        const valor = document.getElementById('valor').value;
        const desconto = document.getElementById('desconto').value;
        const vip = document.getElementById('vip').value;

        const res = await fetch(`${API_URL}/cashback?valor=${valor}&desconto=${desconto}&vip=${vip}`);
        const data = await res.json();

        const divRes = document.getElementById('resultado');
        divRes.style.display = "block";
        divRes.innerHTML = `<strong>Cashback Gerado:</strong> R$ ${data.cashback}`;
        
        carregarHistorico();
    }

    async function carregarHistorico() {
        const res = await fetch(`${API_URL}/historico`);
        const data = await res.json();
        const tbody = document.querySelector('#tabela-historico tbody');
        tbody.innerHTML = "";

        data.historico.forEach(item => {
            const row = `<tr>
                <td>${item.tp_cliente}</td>
                <td>R$ ${parseFloat(item.valor).toFixed(2)}</td>
                <td>R$ ${parseFloat(item.cashback).toFixed(2)}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // Carrega o histórico ao abrir a página
    carregarHistorico();
</script>
</body>
</html>
